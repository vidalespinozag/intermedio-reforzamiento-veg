{% extends "cine/base_generic.html" %}
{% block content %}
    <h3>Confirmando eliminacion de la pelicula</h3>
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}
            <h3>¿Desea eliminarlo el registro de {{ object.titulo }}?</h3>
            <a class="btn btn-danger" href="{% url 'pelicula_list_vbc' %}" role="button">Cancelar</a>
            <button type="submit" class="btn btn-primary">Sí, eliminar</button>
        </form>
    </div>
{% endblock %}
